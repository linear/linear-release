name: Run Release Management

on:
  workflow_call:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: string
      name:
        description: "Release name"
        required: false
        type: string
      version:
        description: "Release version"
        required: false
        type: string

  workflow_dispatch:
    inputs:
      action:
        description: "Action"
        required: true
        type: choice
        options:
          - sync
          - complete
      name:
        description: "Release name"
        required: false
        type: string
      version:
        description: "Release version"
        required: false
        type: string

permissions:
  contents: read

jobs:
  sync:
    name: Sync issues to release
    if: inputs.action == 'sync'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download --repo linear/linear-release --pattern "linear-release-linux-x64" --output linear-release

      - name: Sync issues
        env:
          LINEAR_ACCESS_KEY: ${{ secrets.LINEAR_RELEASE_MANAGEMENT_ACCESS_KEY }}
          RELEASE_NAME: ${{ inputs.name }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          chmod +x linear-release
          args=()
          if [ -n "$RELEASE_NAME" ]; then
            args+=("--name=$RELEASE_NAME")
          fi
          if [ -n "$RELEASE_VERSION" ]; then
            args+=("--release-version=$RELEASE_VERSION")
          fi
          ./linear-release sync "${args[@]}"

  complete:
    name: Complete release
    if: inputs.action == 'complete'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download --repo linear/linear-release --pattern "linear-release-linux-x64" --output linear-release

      - name: Complete release
        env:
          LINEAR_ACCESS_KEY: ${{ secrets.LINEAR_RELEASE_MANAGEMENT_ACCESS_KEY }}
          RELEASE_NAME: ${{ inputs.name }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          chmod +x linear-release
          args=()
          if [ -n "$RELEASE_NAME" ]; then
            args+=("--name=$RELEASE_NAME")
          fi
          if [ -n "$RELEASE_VERSION" ]; then
            args+=("--release-version=$RELEASE_VERSION")
          fi
          ./linear-release complete "${args[@]}"
